name: Build APK and Auto Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_name:
        description: "Optional release tag, example: v1.0.0"
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: Battery-Rock

jobs:
  build-release:
    name: Build and upload release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Resolve release tag
        id: version
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.release_name || '' }}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=${APP_NAME} ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare Gradle command
        id: gradle_cmd
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "cmd=./gradlew" >> "$GITHUB_OUTPUT"
          elif [ -f "./settings.gradle" ] || [ -f "./settings.gradle.kts" ] || [ -f "./build.gradle" ] || [ -f "./build.gradle.kts" ]; then
            echo "cmd=gradle" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No Android/Gradle project was found. Add settings.gradle(.kts), build.gradle(.kts), app/build.gradle(.kts), and Android source files before building an APK."
            exit 1
          fi

      - name: Prepare Android local.properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Prepare Xposed API
        shell: bash
        run: |
          mkdir -p app/libs

          if [ -s "app/libs/api-82.jar" ]; then
            echo "api-82.jar already exists."
            exit 0
          fi

          echo "Trying to download official Xposed API 82 jar..."
          curl -L --retry 3 --retry-delay 2 --fail \
            -o app/libs/api-82.jar \
            "https://github.com/rovo89/XposedBridge/releases/download/82/api-82.jar" || true

          if [ -s "app/libs/api-82.jar" ]; then
            echo "Downloaded Xposed API jar."
            exit 0
          fi

          echo "Download failed. Generating compileOnly Xposed API stub jar for CI build."
          rm -f app/libs/api-82.jar
          STUB_SRC="$RUNNER_TEMP/xposed-api-stub-src"
          STUB_CLASSES="$RUNNER_TEMP/xposed-api-stub-classes"
          mkdir -p "$STUB_SRC/de/robv/android/xposed/callbacks" "$STUB_CLASSES"

          cat > "$STUB_SRC/de/robv/android/xposed/IXposedHookLoadPackage.java" <<'JAVA'
          package de.robv.android.xposed;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          public interface IXposedHookLoadPackage {
              void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable;
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XC_MethodHook.java" <<'JAVA'
          package de.robv.android.xposed;
          public class XC_MethodHook {
              public static class MethodHookParam {
                  public Object thisObject;
                  public Object[] args;
                  public Object result;
                  public Throwable throwable;
                  public void setResult(Object result) { this.result = result; }
                  public Object getResult() { return result; }
                  public void setThrowable(Throwable throwable) { this.throwable = throwable; }
              }
              public static class Unhook {}
              protected void beforeHookedMethod(MethodHookParam param) throws Throwable {}
              protected void afterHookedMethod(MethodHookParam param) throws Throwable {}
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XC_MethodReplacement.java" <<'JAVA'
          package de.robv.android.xposed;
          public abstract class XC_MethodReplacement extends XC_MethodHook {
              protected abstract Object replaceHookedMethod(MethodHookParam param) throws Throwable;
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XposedBridge.java" <<'JAVA'
          package de.robv.android.xposed;
          import java.util.Collections;
          import java.util.Set;
          public final class XposedBridge {
              public static void log(String text) {}
              public static void log(Throwable throwable) {}
              public static Set<XC_MethodHook.Unhook> hookAllMethods(Class<?> hookClass, String methodName, XC_MethodHook callback) {
                  return Collections.emptySet();
              }
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XposedHelpers.java" <<'JAVA'
          package de.robv.android.xposed;
          public final class XposedHelpers {
              public static XC_MethodHook.Unhook findAndHookMethod(String className, ClassLoader classLoader, String methodName, Object... parameterTypesAndCallback) { return null; }
              public static XC_MethodHook.Unhook findAndHookMethod(Class<?> clazz, String methodName, Object... parameterTypesAndCallback) { return null; }
              public static Class<?> findClass(String className, ClassLoader classLoader) throws ClassNotFoundException { return Class.forName(className, false, classLoader); }
              public static Object callMethod(Object obj, String methodName, Object... args) { return null; }
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/callbacks/XC_LoadPackage.java" <<'JAVA'
          package de.robv.android.xposed.callbacks;
          public final class XC_LoadPackage {
              public static final class LoadPackageParam {
                  public String packageName;
                  public ClassLoader classLoader;
              }
          }
          JAVA

          javac -source 8 -target 8 -d "$STUB_CLASSES" $(find "$STUB_SRC" -name '*.java')
          jar cf app/libs/api-82.jar -C "$STUB_CLASSES" .

          if [ ! -s "app/libs/api-82.jar" ]; then
            echo "::error::Failed to prepare Xposed API compileOnly jar."
            exit 1
          fi

      - name: Build release APK
        shell: bash
        run: |
          ${{ steps.gradle_cmd.outputs.cmd }} clean assembleRelease --stacktrace

      - name: Collect APK files
        id: collect
        shell: bash
        run: |
          mkdir -p artifacts
          find . -type f -path "*/build/outputs/apk/*/*.apk" -print -exec cp {} artifacts/ \;

          if ! compgen -G "artifacts/*.apk" > /dev/null; then
            echo "::error::Build completed, but no APK was found under build/outputs/apk."
            exit 1
          fi

          cd artifacts
          for file in *.apk; do
            clean_name="${APP_NAME}-${{ steps.version.outputs.tag }}-${file}"
            mv "$file" "$clean_name"
          done
          sha256sum *.apk > SHA256SUMS.txt

      - name: Create release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          # Battery-Rock Release

          Automated GitHub Actions build for the Battery-Rock LSPosed module.

          ## Included

          - APK artifact built from the latest repository source
          - SHA256 checksum file
          - Automatic GitHub Release upload

          ## Safety

          Battery-Rock is a root/LSPosed module. Install only on devices you own and control. Test on your ROM first, then enable scopes carefully in LSPosed Manager.
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.tag }}
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build APK and Auto Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_name:
        description: "Optional release tag, example: v1.0.2"
        required: false
        type: string

permissions:
  contents: write
  actions: read

env:
  APP_NAME: Battery-Rock
  APP_MODULE: app

concurrency:
  group: battery-rock-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Fully automated APK release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version from Gradle
        id: app_version
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          gradle_file = Path("app/build.gradle.kts")
          text = gradle_file.read_text(encoding="utf-8")

          version_name = re.search(r'versionName\s*=\s*"([^"]+)"', text)
          version_code = re.search(r'versionCode\s*=\s*(\d+)', text)

          if not version_name or not version_code:
              raise SystemExit("versionName or versionCode was not found in app/build.gradle.kts")

          print(f"version_name={version_name.group(1)}")
          print(f"version_code={version_code.group(1)}")
          PY

      - name: Resolve automatic release tag
        id: version
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.release_name || '' }}"
          VERSION_NAME="${{ steps.app_version.outputs.version_name }}"
          VERSION_CODE="${{ steps.app_version.outputs.version_code }}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="v${VERSION_NAME}-build.${GITHUB_RUN_NUMBER}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "::error::Release tag must start with v and contain only letters, numbers, dot, dash, or underscore."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=${APP_NAME} ${TAG}" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Prepare Gradle command
        id: gradle_cmd
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "cmd=./gradlew" >> "$GITHUB_OUTPUT"
          elif [ -f "./settings.gradle" ] || [ -f "./settings.gradle.kts" ] || [ -f "./build.gradle" ] || [ -f "./build.gradle.kts" ]; then
            echo "cmd=gradle" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No Android/Gradle project was found."
            exit 1
          fi

      - name: Prepare Android local.properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Prepare diagnostics folder
        shell: bash
        run: |
          mkdir -p diagnostics
          {
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Run ID: $GITHUB_RUN_ID"
            echo "Run Number: $GITHUB_RUN_NUMBER"
            echo "Ref: $GITHUB_REF"
            echo "SHA: $GITHUB_SHA"
            echo "Tag: ${{ steps.version.outputs.tag }}"
            echo "Version Name: ${{ steps.version.outputs.version_name }}"
            echo "Version Code: ${{ steps.version.outputs.version_code }}"
            echo "Gradle command: ${{ steps.gradle_cmd.outputs.cmd }}"
            echo "Android SDK: ${ANDROID_HOME}"
            echo "Java version:"
            java -version 2>&1
          } > diagnostics/environment.txt

      - name: Prepare Xposed API
        shell: bash
        run: |
          mkdir -p app/libs

          if [ -s "app/libs/api-82.jar" ]; then
            echo "api-82.jar already exists."
            exit 0
          fi

          echo "Trying to download Xposed API 82 jar..."
          curl -L --retry 3 --retry-delay 2 --fail \
            -o app/libs/api-82.jar \
            "https://github.com/rovo89/XposedBridge/releases/download/82/api-82.jar" || true

          if [ -s "app/libs/api-82.jar" ]; then
            echo "Downloaded Xposed API jar."
            exit 0
          fi

          echo "Download failed. Generating compile-only Xposed API stub jar for CI build."
          rm -f app/libs/api-82.jar
          STUB_SRC="$RUNNER_TEMP/xposed-api-stub-src"
          STUB_CLASSES="$RUNNER_TEMP/xposed-api-stub-classes"
          mkdir -p "$STUB_SRC/de/robv/android/xposed/callbacks" "$STUB_CLASSES"

          cat > "$STUB_SRC/de/robv/android/xposed/IXposedHookLoadPackage.java" <<'JAVA'
          package de.robv.android.xposed;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          public interface IXposedHookLoadPackage {
              void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable;
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XC_MethodHook.java" <<'JAVA'
          package de.robv.android.xposed;
          public class XC_MethodHook {
              public static class MethodHookParam {
                  public Object thisObject;
                  public Object[] args;
                  private Object result;
                  private Throwable throwable;
                  public void setResult(Object result) { this.result = result; }
                  public Object getResult() { return result; }
                  public void setThrowable(Throwable throwable) { this.throwable = throwable; }
                  public Throwable getThrowable() { return throwable; }
              }
              public static class Unhook {}
              protected void beforeHookedMethod(MethodHookParam param) throws Throwable {}
              protected void afterHookedMethod(MethodHookParam param) throws Throwable {}
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XC_MethodReplacement.java" <<'JAVA'
          package de.robv.android.xposed;
          public abstract class XC_MethodReplacement extends XC_MethodHook {
              protected abstract Object replaceHookedMethod(MethodHookParam param) throws Throwable;
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XposedBridge.java" <<'JAVA'
          package de.robv.android.xposed;
          import java.util.Collections;
          import java.util.Set;
          public final class XposedBridge {
              public static void log(String text) {}
              public static void log(Throwable throwable) {}
              public static Set<XC_MethodHook.Unhook> hookAllMethods(Class<?> hookClass, String methodName, XC_MethodHook callback) {
                  return Collections.emptySet();
              }
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/XposedHelpers.java" <<'JAVA'
          package de.robv.android.xposed;
          public final class XposedHelpers {
              public static XC_MethodHook.Unhook findAndHookMethod(String className, ClassLoader classLoader, String methodName, Object... parameterTypesAndCallback) { return null; }
              public static XC_MethodHook.Unhook findAndHookMethod(Class<?> clazz, String methodName, Object... parameterTypesAndCallback) { return null; }
              public static Class<?> findClass(String className, ClassLoader classLoader) throws ClassNotFoundException { return Class.forName(className, false, classLoader); }
              public static Object callMethod(Object obj, String methodName, Object... args) { return null; }
          }
          JAVA

          cat > "$STUB_SRC/de/robv/android/xposed/callbacks/XC_LoadPackage.java" <<'JAVA'
          package de.robv.android.xposed.callbacks;
          public final class XC_LoadPackage {
              public static final class LoadPackageParam {
                  public String packageName;
                  public ClassLoader classLoader;
              }
          }
          JAVA

          javac -source 8 -target 8 -d "$STUB_CLASSES" $(find "$STUB_SRC" -name '*.java')
          jar cf app/libs/api-82.jar -C "$STUB_CLASSES" .

          if [ ! -s "app/libs/api-82.jar" ]; then
            echo "::error::Failed to prepare Xposed API compile-only jar."
            exit 1
          fi

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          ${{ steps.gradle_cmd.outputs.cmd }} --no-daemon clean :app:assembleRelease --stacktrace --info 2>&1 | tee diagnostics/build-release-apk.log

      - name: Verify APK signatures
        shell: bash
        run: |
          APKSIGNER="${ANDROID_HOME}/build-tools/35.0.0/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner was not found."
            exit 1
          fi

          find app/build/outputs/apk/release -name "*.apk" -print | while read -r apk; do
            echo "Checking $apk"
            "$APKSIGNER" verify --print-certs "$apk" | tee -a diagnostics/apk-signatures.txt
          done

      - name: Capture failure diagnostics
        if: failure()
        shell: bash
        run: |
          mkdir -p diagnostics
          find . -path "*/build/reports/*" -type f -print > diagnostics/report-files.txt || true
          find . -path "*/build/outputs/logs/*" -type f -print > diagnostics/output-log-files.txt || true
          find . -name "*.log" -type f -print > diagnostics/all-log-files.txt || true
          if [ -f diagnostics/build-release-apk.log ]; then
            grep -n -E "FAILURE:|What went wrong|Execution failed|Could not|error:|ERROR:|Exception|Compilation error|Unresolved reference" diagnostics/build-release-apk.log > diagnostics/important-errors.txt || true
          fi

      - name: Collect APK files and metadata
        id: collect
        shell: bash
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk/release -name "*.apk" -print -exec cp {} artifacts/ \;

          if ! compgen -G "artifacts/*.apk" > /dev/null; then
            echo "::error::Build completed, but no release APK was found."
            exit 1
          fi

          cd artifacts
          for file in *.apk; do
            clean_name="${APP_NAME}-${{ steps.version.outputs.tag }}-${file}"
            mv "$file" "$clean_name"
          done

          sha256sum *.apk > SHA256SUMS.txt

          {
            echo "App: ${APP_NAME}"
            echo "Package: dev.sayanthrock.batteryrock"
            echo "Version Name: ${{ steps.version.outputs.version_name }}"
            echo "Version Code: ${{ steps.version.outputs.version_code }}"
            echo "Release Tag: ${{ steps.version.outputs.tag }}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Build Run: ${GITHUB_RUN_NUMBER}"
            echo "Built At UTC: $(date -u +'%Y-%m-%d %H:%M:%S')"
          } > APK_INFO.txt

      - name: Create automatic release notes
        shell: bash
        run: |
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || true)"

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG="$(git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG"..HEAD || true)"
          else
            CHANGELOG="$(git log --pretty=format:'- %s (%h)' -n 20 || true)"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Automated APK build from the latest repository source."
          fi

          cat > RELEASE_NOTES.md <<EOF
          # Battery-Rock ${{ steps.version.outputs.tag }}

          Fully automated public GitHub Actions release for the Battery-Rock LSPosed module.

          ## APK Details

          - App: Battery-Rock
          - Package: dev.sayanthrock.batteryrock
          - Version Name: ${{ steps.version.outputs.version_name }}
          - Version Code: ${{ steps.version.outputs.version_code }}
          - Commit: ${GITHUB_SHA}
          - Build Run: ${GITHUB_RUN_NUMBER}

          ## Included Files

          - Release APK
          - SHA256 checksum file
          - APK_INFO.txt
          - Workflow diagnostics artifact

          ## Changes

          ${CHANGELOG}

          ## Safety

          Battery-Rock is a root and LSPosed module. Install only on devices you own and control. Test on your ROM first, then enable scopes carefully in LSPosed Manager.
          EOF

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-diagnostics-${{ steps.version.outputs.tag }}
          path: diagnostics/*
          if-no-files-found: warn

      - name: Upload APK workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.tag }}
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release automatically
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.release_name }}
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

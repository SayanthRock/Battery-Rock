name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName *= *"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)
          VERSION_CODE=$(sed -n 's/.*versionCode *= *\([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)

          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0.0"
          fi

          if [ -z "$VERSION_CODE" ]; then
            VERSION_CODE="0"
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_TAG="v${VERSION_NAME}-${GITHUB_RUN_NUMBER}"
          APK_BASENAME="Battery-Rock-v${VERSION_NAME}-${VERSION_CODE}-${SHORT_SHA}"

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "apk_basename=$APK_BASENAME" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        shell: bash
        run: |
          gradle --no-daemon clean :app:assembleRelease

      - name: Collect APK files
        shell: bash
        run: |
          mkdir -p dist
          APK_COUNT=0

          while IFS= read -r apk; do
            APK_COUNT=$((APK_COUNT + 1))
            cp "$apk" "dist/${{ steps.version.outputs.apk_basename }}-${APK_COUNT}.apk"
          done < <(find app/build/outputs/apk/release -type f -name "*.apk" | sort)

          if [ "$APK_COUNT" -eq 0 ]; then
            echo "No APK files found in app/build/outputs/apk/release"
            exit 1
          fi

          ls -lh dist

      - name: Create release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<EOF
          # Battery-Rock ${{ steps.version.outputs.version_name }}

          Automated GitHub release for Battery-Rock.

          ## Build Details
          - App version: ${{ steps.version.outputs.version_name }}
          - Version code: ${{ steps.version.outputs.version_code }}
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Workflow run: ${{ github.run_number }}

          ## APK
          The APK file is attached below under release assets.
          EOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Battery-Rock-APK-${{ steps.version.outputs.version_name }}-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: Battery-Rock ${{ steps.version.outputs.version_name }} Build ${{ github.run_number }}
          body_path: RELEASE_NOTES.md
          files: dist/*.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
